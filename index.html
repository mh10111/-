<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박민형 소개</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            margin: 8px 0;
            line-height: 1.5;
        }
        .highlight {
            color: #f59e0b;
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 안녕하세요, 박민형입니다</h1>
        <p>저는 <span class="highlight">한화 이글스</span>의 열혈 팬입니다 ⚾</p>
        <p>취미는</p>
        <p>🎿 스키장 가기</p>
        <p>🎮 리그 오브 레전드 플레이</p>
        <div class="footer">
            <p>GitHub Pages로 배포된 개인 소개 페이지입니다</p>
        </div>
    </div>
</body>
</html>
